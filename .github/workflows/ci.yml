name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff linter
        run: ruff check backend/app/ --select E,W,F

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    env:
      API_KEY: test-key
      LLM_PROVIDER: gemini
      GEMINI_API_KEY: fake-key-for-tests
      GROQ_API_KEY: fake-key-for-tests
      EMAIL_PROVIDER: sendgrid
      SENDGRID_API_KEY: fake-key-for-tests
      RESEND_API_KEY: fake-key-for-tests
      ALLOWED_ORIGINS: http://localhost:5173
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_API_URL: https://api.example.com
          VITE_API_KEY: build-test-key

  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create backend .env file
        run: |
          cat > backend/.env << EOF
          API_KEY=test-key
          LLM_PROVIDER=gemini
          GEMINI_API_KEY=fake-key
          EMAIL_PROVIDER=sendgrid
          SENDGRID_API_KEY=fake-key
          ALLOWED_ORIGINS=http://localhost:5173
          EOF

      - name: Build Docker images
        run: docker compose build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: sleep 15

      - name: Health check
        run: |
          curl -f http://localhost:8000/api/health || \
          (echo "Health check failed" && docker compose logs && exit 1)

      - name: Stop services
        run: docker compose down
